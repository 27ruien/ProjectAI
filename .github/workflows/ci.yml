name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_PUBLIC_BASE_PATH: /tool/projectai
      NEXT_PUBLIC_APP_ENV: test
      NEXT_PUBLIC_APP_VERSION: ci
      NEXT_PUBLIC_COMMIT_SHA: ${{ github.sha }}
      AI_PROVIDER: mock

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: SSR and route tests
        run: npm test

      - name: Playwright MVP flows
        run: npm run test:e2e

      - name: Production build
        run: npm run build

      - name: Upload Playwright evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-evidence-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            playwright-report/
            test-results/
