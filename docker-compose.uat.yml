name: projectai-uat

services:
  postgres:
    image: pgvector/pgvector:0.8.1-pg17
    container_name: project-ai-os-uat-postgres
    environment:
      POSTGRES_DB: projectai_uat
      POSTGRES_USER: projectai_uat
      POSTGRES_PASSWORD: ${PROJECTAI_UAT_DB_PASSWORD:?PROJECTAI_UAT_DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${PROJECTAI_UAT_DB_PORT:-55432}:5432"
    volumes:
      - projectai-uat-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectai_uat -d projectai_uat"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G

volumes:
  projectai-uat-postgres:
    name: projectai-uat-postgres
