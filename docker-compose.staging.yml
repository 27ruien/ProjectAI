      args:
        NEXT_PUBLIC_BASE_PATH: /tool/projectai-staging
        NEXT_PUBLIC_APP_ENV: staging
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.8.0-staging}
        NEXT_PUBLIC_COMMIT_SHA: ${NEXT_PUBLIC_COMMIT_SHA:-local}
        NEXT_PUBLIC_BUILD_TIME: ${NEXT_PUBLIC_BUILD_TIME:-local}
    container_name: project-ai-os-staging
    restart: unless-stopped
    init: true
    cpus: 1.0
    mem_limit: 768m
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    env_file:
      - /srv/projectai-staging/.env.ai
    environment:
      <<: [*document-processing-environment, *embedding-environment]
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      VINEXT_TRUSTED_HOSTS: gridworks.cn
      PM_DAILY_REPORT_ENABLED: ${PM_DAILY_REPORT_ENABLED:-false}
      WECOM_TIMESHEET_SYNC_ENABLED: ${WECOM_TIMESHEET_SYNC_ENABLED:-false}
      PM_DAILY_REPORT_CONFIDENCE_THRESHOLD: ${PM_DAILY_REPORT_CONFIDENCE_THRESHOLD:-0.85}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required}
      AUTH_COOKIE_PREFIX: ${AUTH_COOKIE_PREFIX:?AUTH_COOKIE_PREFIX is required}
      AUTH_TRUSTED_ORIGINS: ${AUTH_TRUSTED_ORIGINS:?AUTH_TRUSTED_ORIGINS is required}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-mock-wecom}
      ALLOW_MOCK_WECOM_AUTH: ${ALLOW_MOCK_WECOM_AUTH:-true}
      ALLOW_DEBUG_IDENTITY: ${ALLOW_DEBUG_IDENTITY:-false}
      AUTH_MOCK_LOGIN_RATE_LIMIT_MAX: ${AUTH_MOCK_LOGIN_RATE_LIMIT_MAX:-60}
      ORGANIZATION_NAME: ${ORGANIZATION_NAME:-Kivisense}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:?OBJECT_STORAGE_ENDPOINT is required}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:?OBJECT_STORAGE_REGION is required}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:?OBJECT_STORAGE_BUCKET is required}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:?OBJECT_STORAGE_ACCESS_KEY is required}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:?OBJECT_STORAGE_SECRET_KEY is required}
      OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE:?OBJECT_STORAGE_FORCE_PATH_STYLE is required}
      OBJECT_STORAGE_USE_SSL: ${OBJECT_STORAGE_USE_SSL:?OBJECT_STORAGE_USE_SSL is required}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-52428800}
      UPLOAD_ALLOWED_EXTENSIONS: ${UPLOAD_ALLOWED_EXTENSIONS:-pdf,docx,xlsx,pptx,txt,md}
      STAGING_HEALTHCHECK_PATH: ${STAGING_HEALTHCHECK_PATH:-/api/health}
      NEXT_PUBLIC_BASE_PATH: /tool/projectai-staging
      NEXT_PUBLIC_APP_ENV: staging
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.8.0-staging}
      NEXT_PUBLIC_COMMIT_SHA: ${NEXT_PUBLIC_COMMIT_SHA:-local}
      NEXT_PUBLIC_BUILD_TIME: ${NEXT_PUBLIC_BUILD_TIME:-local}
    secrets:
      - qwen_api_key
    depends_on:
      projectai-postgres:
        condition: service_healthy
      projectai-minio:
        condition: service_healthy
      projectai-minio-init:
        condition: service_completed_successfully
      projectai-document-worker:
        condition: service_healthy
      projectai-embedding-worker:
        condition: service_healthy
    networks:
      - projectai-staging-internal
    ports:
      - "127.0.0.1:3101:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const base=(process.env.NEXT_PUBLIC_BASE_PATH||'').replace(/\\/$/,'');const path=process.env.STAGING_HEALTHCHECK_PATH||'/api/health';fetch('http://127.0.0.1:3000'+base+path).then(async r=>{if(!r.ok)process.exit(1);if(path==='/api/health'&&(await r.json()).status!=='ok')process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  projectai-document-worker:
    image: ${STAGING_WORKER_IMAGE:-project-ai-os-staging:${NEXT_PUBLIC_COMMIT_SHA:-local}}
    container_name: project-ai-os-staging-worker
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    cpus: 1.0
    mem_limit: 768m
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    environment:
      <<: [*document-processing-environment, *embedding-environment]
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:?OBJECT_STORAGE_ENDPOINT is required}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:?OBJECT_STORAGE_REGION is required}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:?OBJECT_STORAGE_BUCKET is required}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:?OBJECT_STORAGE_ACCESS_KEY is required}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:?OBJECT_STORAGE_SECRET_KEY is required}
      OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE:?OBJECT_STORAGE_FORCE_PATH_STYLE is required}
      OBJECT_STORAGE_USE_SSL: ${OBJECT_STORAGE_USE_SSL:?OBJECT_STORAGE_USE_SSL is required}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-52428800}
      UPLOAD_ALLOWED_EXTENSIONS: ${UPLOAD_ALLOWED_EXTENSIONS:-pdf,docx,xlsx,pptx,txt,md}
      NEXT_PUBLIC_APP_ENV: staging
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.8.0-staging}
      NEXT_PUBLIC_COMMIT_SHA: ${NEXT_PUBLIC_COMMIT_SHA:-local}
      NEXT_PUBLIC_BUILD_TIME: ${NEXT_PUBLIC_BUILD_TIME:-local}
    command:
      - npm
      - run
      - worker:documents
    depends_on:
      projectai-postgres:
        condition: service_healthy
      projectai-minio:
        condition: service_healthy
      projectai-minio-init:
        condition: service_completed_successfully
    networks:
      - projectai-staging-internal
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const fs=require('node:fs');const age=Date.now()-fs.statSync('/tmp/projectai-document-worker-heartbeat').mtimeMs;if(age>60000)process.exit(1)"
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  projectai-embedding-worker:
    image: ${STAGING_EMBEDDING_WORKER_IMAGE:-project-ai-os-staging:${NEXT_PUBLIC_COMMIT_SHA:-local}}
    container_name: project-ai-os-staging-embedding-worker
    restart: unless-stopped
    init: true
    stop_grace_period: 45s
    cpus: 1.0
    mem_limit: 768m
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    env_file:
      - /srv/projectai-staging/.env.ai
    environment:
      <<: *embedding-environment
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      NEXT_PUBLIC_APP_ENV: staging
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.8.0-staging}
      NEXT_PUBLIC_COMMIT_SHA: ${NEXT_PUBLIC_COMMIT_SHA:-local}
      NEXT_PUBLIC_BUILD_TIME: ${NEXT_PUBLIC_BUILD_TIME:-local}
    secrets:
      - qwen_api_key
    command:
      - npm
      - run
      - worker:embeddings
    depends_on:
      projectai-postgres:
        condition: service_healthy
    networks:
      - projectai-staging-internal
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const fs=require('node:fs');const p='/tmp/projectai-embedding-worker-heartbeat';const age=Date.now()-fs.statSync(p).mtimeMs;const mode=fs.readFileSync(p,'utf8').trim().split(/\\s+/).at(-1);if(age>60000||!['enabled','disabled'].includes(mode))process.exit(1)"
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  projectai-staging-postgres:
    name: projectai-staging-postgres
  projectai-staging-minio:
    name: projectai-staging-minio

networks:
  projectai-staging-internal:
    name: projectai-staging-internal
    driver: bridge

secrets:
  qwen_api_key:
    file: /srv/projectai-staging/secrets/qwen_api_key
