name: projectai-staging

x-document-processing-environment: &document-processing-environment
  DOCUMENT_WORKER_POLL_MS: ${DOCUMENT_WORKER_POLL_MS:-2000}
  DOCUMENT_WORKER_LEASE_SECONDS: ${DOCUMENT_WORKER_LEASE_SECONDS:-120}
  DOCUMENT_WORKER_MAX_ATTEMPTS: ${DOCUMENT_WORKER_MAX_ATTEMPTS:-3}
  DOCUMENT_MAX_PAGES: ${DOCUMENT_MAX_PAGES:-1000}
  DOCUMENT_MAX_SLIDES: ${DOCUMENT_MAX_SLIDES:-1000}
  DOCUMENT_MAX_SHEETS: ${DOCUMENT_MAX_SHEETS:-100}
  DOCUMENT_MAX_ROWS: ${DOCUMENT_MAX_ROWS:-100000}
  DOCUMENT_MAX_COLUMNS: ${DOCUMENT_MAX_COLUMNS:-1000}
  DOCUMENT_MAX_CELLS: ${DOCUMENT_MAX_CELLS:-500000}
  DOCUMENT_MAX_CHARACTERS: ${DOCUMENT_MAX_CHARACTERS:-10000000}
  DOCUMENT_MAX_SECTIONS: ${DOCUMENT_MAX_SECTIONS:-20000}
  DOCUMENT_MAX_CHUNKS: ${DOCUMENT_MAX_CHUNKS:-50000}
  DOCUMENT_PARSE_TIMEOUT_MS: ${DOCUMENT_PARSE_TIMEOUT_MS:-120000}
  DOCUMENT_CHUNK_TARGET_CHARS: ${DOCUMENT_CHUNK_TARGET_CHARS:-1800}
  DOCUMENT_CHUNK_OVERLAP_CHARS: ${DOCUMENT_CHUNK_OVERLAP_CHARS:-200}
  DOCUMENT_CHUNK_MIN_CHARS: ${DOCUMENT_CHUNK_MIN_CHARS:-120}
  DOCUMENT_PARSER_VERSION: ${DOCUMENT_PARSER_VERSION:-1}
  DOCUMENT_CHUNKER_VERSION: ${DOCUMENT_CHUNKER_VERSION:-1}

x-embedding-environment: &embedding-environment
  AI_EMBEDDING_ENABLED: ${AI_EMBEDDING_ENABLED:-false}
  AI_EMBEDDING_PROFILE_ID: ${AI_EMBEDDING_PROFILE_ID:-qwen-text-embedding-cn-v1}
  AI_EMBEDDING_DIMENSIONS: ${AI_EMBEDDING_DIMENSIONS:-1024}
  AI_EMBEDDING_WORKER_POLL_MS: ${AI_EMBEDDING_WORKER_POLL_MS:-2000}
  AI_EMBEDDING_WORKER_LEASE_SECONDS: ${AI_EMBEDDING_WORKER_LEASE_SECONDS:-120}
  AI_EMBEDDING_WORKER_MAX_ATTEMPTS: ${AI_EMBEDDING_WORKER_MAX_ATTEMPTS:-3}
  AI_EMBEDDING_BATCH_SIZE: ${AI_EMBEDDING_BATCH_SIZE:-10}
  AI_EMBEDDING_BATCH_MAX_CHARACTERS: ${AI_EMBEDDING_BATCH_MAX_CHARACTERS:-30000}
  AI_EMBEDDING_DAILY_JOB_LIMIT: ${AI_EMBEDDING_DAILY_JOB_LIMIT:-500}
  AI_EMBEDDING_DAILY_TOKEN_LIMIT: ${AI_EMBEDDING_DAILY_TOKEN_LIMIT:-5000000}
  AI_EMBEDDING_WORKER_SHUTDOWN_DRAIN_MS: ${AI_EMBEDDING_WORKER_SHUTDOWN_DRAIN_MS:-25000}

services:
  projectai-postgres:
    image: ${STAGING_POSTGRES_IMAGE:-pgvector/pgvector:0.8.1-pg17}
    container_name: project-ai-os-staging-postgres
    restart: unless-stopped
    cpus: 1.0
    mem_limit: 768m
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - projectai-staging-postgres:/var/lib/postgresql/data
    networks:
      - projectai-staging-internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  projectai-minio:
    image: ${STAGING_MINIO_IMAGE:-quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z}
    container_name: project-ai-os-staging-minio
    restart: unless-stopped
    init: true
    cpus: 1.0
    mem_limit: 768m
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    command:
      - server
      - /data
      - --console-address
      - :9001
    volumes:
      - projectai-staging-minio:/data
    networks:
      - projectai-staging-internal
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "--show-error",
          "http://127.0.0.1:9000/minio/health/live"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  projectai-minio-init:
    image: ${STAGING_MINIO_CLIENT_IMAGE:-quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z}
    restart: "no"
    cpus: 0.5
    mem_limit: 256m
    pids_limit: 128
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "2"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:?OBJECT_STORAGE_ENDPOINT is required}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:?OBJECT_STORAGE_BUCKET is required}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:?OBJECT_STORAGE_ACCESS_KEY is required}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:?OBJECT_STORAGE_SECRET_KEY is required}
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        umask 077
        config_dir="$$(mktemp -d /tmp/projectai-mc.XXXXXX)"
        policy_file="$$(mktemp /tmp/projectai-policy.XXXXXX)"
        trap 'rm -rf "$${config_dir}" "$${policy_file}"' EXIT
        mc --quiet --config-dir "$${config_dir}" alias set projectai-admin "$${OBJECT_STORAGE_ENDPOINT}" "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc --quiet --config-dir "$${config_dir}" mb --ignore-existing "projectai-admin/$${OBJECT_STORAGE_BUCKET}"
        mc --quiet --config-dir "$${config_dir}" anonymous set none "projectai-admin/$${OBJECT_STORAGE_BUCKET}"
        if ! mc --quiet --config-dir "$${config_dir}" admin user info projectai-admin "$${OBJECT_STORAGE_ACCESS_KEY}" >/dev/null 2>&1; then
          mc --quiet --config-dir "$${config_dir}" admin user add projectai-admin "$${OBJECT_STORAGE_ACCESS_KEY}" "$${OBJECT_STORAGE_SECRET_KEY}"
        fi
        printf '%s' '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["s3:GetBucketLocation","s3:ListBucket","s3:ListBucketMultipartUploads"],"Resource":["arn:aws:s3:::'"$${OBJECT_STORAGE_BUCKET}"'"]},{"Effect":"Allow","Action":["s3:GetObject","s3:PutObject","s3:DeleteObject","s3:AbortMultipartUpload","s3:ListMultipartUploadParts"],"Resource":["arn:aws:s3:::'"$${OBJECT_STORAGE_BUCKET}"'/projects/*"]}]}' > "$${policy_file}"
        mc --quiet --config-dir "$${config_dir}" admin policy create projectai-admin projectai-staging-files "$${policy_file}"
        mc --quiet --config-dir "$${config_dir}" admin policy attach projectai-admin projectai-staging-files --user "$${OBJECT_STORAGE_ACCESS_KEY}"
        mc --quiet --config-dir "$${config_dir}" alias set projectai-app "$${OBJECT_STORAGE_ENDPOINT}" "$${OBJECT_STORAGE_ACCESS_KEY}" "$${OBJECT_STORAGE_SECRET_KEY}"
        mc --quiet --config-dir "$${config_dir}" ls "projectai-app/$${OBJECT_STORAGE_BUCKET}" >/dev/null
        privacy="$$(mc --config-dir "$${config_dir}" anonymous get "projectai-admin/$${OBJECT_STORAGE_BUCKET}" 2>/dev/null)"
        case "$${privacy}" in
          *private*) ;;
          *) printf 'Staging object-storage bucket privacy verification failed.\n' >&2; exit 1 ;;
        esac
    depends_on:
      projectai-minio:
        condition: service_healthy
    networks:
      - projectai-staging-internal

  projectai-migrate:
    profiles:
      - operations
    image: ${STAGING_DB_TOOLS_IMAGE:-project-ai-os-staging-db-tools:${NEXT_PUBLIC_COMMIT_SHA:-local}}
    build:
      context: .
      target: db-tools
    environment:
      <<: [*document-processing-environment, *embedding-environment]
      NODE_ENV: production
      NEXT_PUBLIC_APP_ENV: staging
      PROJECTAI_SEED_ENVIRONMENT: ${PROJECTAI_SEED_ENVIRONMENT:-}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required}
      AUTH_COOKIE_PREFIX: ${AUTH_COOKIE_PREFIX:?AUTH_COOKIE_PREFIX is required}
      AUTH_TRUSTED_ORIGINS: ${AUTH_TRUSTED_ORIGINS:?AUTH_TRUSTED_ORIGINS is required}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-mock-wecom}
      ALLOW_MOCK_WECOM_AUTH: ${ALLOW_MOCK_WECOM_AUTH:-true}
      ALLOW_DEBUG_IDENTITY: ${ALLOW_DEBUG_IDENTITY:-false}
      AUTH_MOCK_LOGIN_RATE_LIMIT_MAX: ${AUTH_MOCK_LOGIN_RATE_LIMIT_MAX:-60}
      ORGANIZATION_NAME: ${ORGANIZATION_NAME:-Kivisense}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_ORG_ADMIN_EMAIL: ${SEED_ORG_ADMIN_EMAIL:-}
      SEED_ORG_ADMIN_PASSWORD: ${SEED_ORG_ADMIN_PASSWORD:-}
      SEED_DEPT_ADMIN_EMAIL: ${SEED_DEPT_ADMIN_EMAIL:-}
      SEED_DEPT_ADMIN_PASSWORD: ${SEED_DEPT_ADMIN_PASSWORD:-}
      SEED_MANAGER_A_EMAIL: ${SEED_MANAGER_A_EMAIL:-}
      SEED_MANAGER_A_PASSWORD: ${SEED_MANAGER_A_PASSWORD:-}
      SEED_MANAGER_B_EMAIL: ${SEED_MANAGER_B_EMAIL:-}
      SEED_MANAGER_B_PASSWORD: ${SEED_MANAGER_B_PASSWORD:-}
      SEED_MEMBER_A_EMAIL: ${SEED_MEMBER_A_EMAIL:-}
      SEED_MEMBER_A_PASSWORD: ${SEED_MEMBER_A_PASSWORD:-}
      SEED_VIEWER_A_EMAIL: ${SEED_VIEWER_A_EMAIL:-}
      SEED_VIEWER_A_PASSWORD: ${SEED_VIEWER_A_PASSWORD:-}
      SEED_OTHER_DEPT_EMAIL: ${SEED_OTHER_DEPT_EMAIL:-}
      SEED_OTHER_DEPT_PASSWORD: ${SEED_OTHER_DEPT_PASSWORD:-}
      SEED_OUTSIDER_EMAIL: ${SEED_OUTSIDER_EMAIL:-}
      SEED_OUTSIDER_PASSWORD: ${SEED_OUTSIDER_PASSWORD:-}
    depends_on:
      projectai-postgres:
        condition: service_healthy
    networks:
      - projectai-staging-internal
    restart: "no"
    cpus: 1.0
    mem_limit: 512m
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "2"
    command: npm run db:migrate

  projectai-storage-ops:
    profiles:
      - operations
    image: ${STAGING_DB_TOOLS_IMAGE:-project-ai-os-staging-db-tools:${NEXT_PUBLIC_COMMIT_SHA:-local}}
    build:
