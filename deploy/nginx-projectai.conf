# Add these locations inside the existing HTTPS server block for gridworks.cn.
# Keep proxy_pass without a trailing slash so the application receives its basePath.
location = /tool/projectai {
    return 308 /tool/projectai/;
}

location ^~ /tool/projectai/ {
    proxy_pass http://127.0.0.1:3100;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    client_max_body_size 50m;
}
