# Add these locations inside the existing gridworks.cn HTTPS server block.
# Back up the actual server configuration before editing it, run `sudo nginx -t`,
# and reload Nginx only after validation succeeds. This file is a snippet; it
# must not replace the existing server block.
location = /tool/projectai-staging {
    return 308 /tool/projectai-staging/;
    add_header X-Robots-Tag "noindex, nofollow" always;
}

# vinext generates basePath-prefixed asset URLs but serves the built files from
# /assets inside the standalone container. The trailing slash below intentionally
# strips only the staging asset prefix. Do not add a broad, shared /assets route.
location ^~ /tool/projectai-staging/assets/ {
    proxy_pass http://127.0.0.1:3101/assets/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Robots-Tag "noindex, nofollow" always;
}

# next/font in the current vinext build emits the narrow origin-level namespace
# /assets/_vinext_fonts/. Keep using the existing production mapping for those
# content-hashed Geist files; never introduce a catch-all /assets proxy here.
location ^~ /tool/projectai-staging/ {
    proxy_pass http://127.0.0.1:3101;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    client_max_body_size 50m;

    add_header X-Robots-Tag "noindex, nofollow" always;
}
