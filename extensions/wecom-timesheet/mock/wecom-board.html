<!doctype html>
<html lang="zh-CN">
  <head><meta charset="utf-8" /><title>Mock WeCom Board</title></head>
  <body>
    <main data-testid="mock-board-ready">
      <h1>Mock 企业微信任务看板</h1>
      <p data-testid="mock-login-required" hidden>请扫码登录</p>
      <div data-testid="mock-overlay" hidden>突发弹窗</div>
      <button data-testid="mock-create-task">创建任务</button>
      <iframe data-testid="mock-task-frame" src="wecom-form.html" hidden></iframe>
      <section data-testid="mock-records" aria-label="已保存任务"></section>
      <button data-testid="mock-final-submit">最终提交日报</button>
      <output id="final-submit-count">0</output>
    </main>
    <script>
      const query = new URLSearchParams(location.search);
      document.querySelector("[data-testid='mock-login-required']").hidden = query.get("login") !== "0";
      document.querySelector("[data-testid='mock-overlay']").hidden = query.get("overlay") !== "1";
      const frame = document.querySelector("iframe");
      frame.src = `wecom-form.html?${query.toString()}`;
      document.querySelector("[data-testid='mock-create-task']").addEventListener("click", () => { frame.hidden = false; });
      document.querySelector("[data-testid='mock-final-submit']").addEventListener("click", () => {
        const output = document.querySelector("#final-submit-count");
        output.value = String(Number(output.value) + 1);
      });
    </script>
  </body>
</html>
