<!doctype html>
<html lang="zh-CN">
  <head><meta charset="utf-8" /><title>Mock WeCom Form</title></head>
  <body>
    <form data-testid="mock-task-form" onsubmit="return false">
      <label>任务详情<textarea name="description"></textarea></label>
      <label>项目<select name="project"><option value="">请选择</option><option value="project-001">ProjectAI WeCom UAT</option><option value="project-002">Fictional Delivery Project</option></select></label>
      <button data-testid="mock-project-portal-control" type="button" hidden>请选择</button>
      <div data-testid="mock-project-portal" role="listbox" hidden></div>
      <label>提交人<input name="submitter" value="当前登录用户" readonly /></label>
      <label>PM-当日工时<input name="regular-hours" type="number" step="0.25" /></label>
      <label>PM-当日加班工时<input name="overtime-hours" type="number" step="0.25" /></label>
      <label>ProjectAI 内部分类<input data-testid="mock-unmapped-category" value="企业微信未映射" readonly /></label>
      <label>状态<select name="status"><option value="">请选择</option><option value="completed">已完成</option><option value="in_progress">进行中</option><option value="blocked">阻塞</option></select></label>
      <label>紧急重要度<select name="urgency"><option value="">不设置</option><option value="urgent">紧急</option><option value="important">重要</option></select></label>
      <label>任务进度<input name="progress" type="number" min="0" max="100" step="1" /></label>
      <button data-testid="mock-save-item" type="button">保存单条任务</button>
    </form>
    <section id="results"></section>
    <script>
      const query = new URLSearchParams(location.search);
      if (query.get("noMatch") === "1") {
        document.querySelector("select[name='project'] option[value='project-001']")?.remove();
      }
      if (query.get("duplicate") === "1") {
        const duplicate = document.createElement("option");
        duplicate.value = "project-duplicate";
        duplicate.textContent = "ProjectAI WeCom UAT";
        document.querySelector("select[name='project']").append(duplicate);
      }
      if (query.get("portal") === "1") {
        const select = document.querySelector("select[name='project']");
        const control = document.querySelector("[data-testid='mock-project-portal-control']");
        const portal = document.querySelector("[data-testid='mock-project-portal']");
        select.hidden = true;
        control.hidden = false;
        control.addEventListener("click", () => {
          portal.hidden = false;
          if (portal.childElementCount) return;
          for (const [index, label] of ["ProjectAI WeCom UAT", "Fictional Delivery Project"].entries()) {
            const option = document.createElement("button");
            option.type = "button";
            option.role = "option";
            option.dataset.virtualIndex = String(index);
            option.textContent = label;
            option.addEventListener("click", () => {
              control.textContent = label;
              portal.hidden = true;
            });
            portal.append(option);
          }
        });
      }
      if (query.get("progressReadonly") === "1") {
        const progress = document.querySelector("input[name='progress']");
        progress.readOnly = true;
        progress.value = "100";
      }
      if (query.get("progressReadonly") === "mismatch") {
        const progress = document.querySelector("input[name='progress']");
        progress.readOnly = true;
        progress.value = "80";
      }
      document.querySelector("[data-testid='mock-save-item']").addEventListener("click", () => {
        if (query.get("unknown") === "1") return;
        const result = document.createElement("p");
        if (query.get("failure") === "1") {
          result.dataset.testid = "mock-save-failure";
          result.textContent = "保存失败";
        } else {
          result.dataset.testid = "mock-save-success";
          result.textContent = `saved-${document.querySelectorAll("[data-testid='mock-save-success']").length + 1}`;
          const form = document.querySelector("form");
          const values = {
            description: form.querySelector("[name='description']").value,
            project: form.querySelector("[name='project']").selectedOptions[0]?.textContent?.trim() ?? "",
            submitter: form.querySelector("[name='submitter']").value,
            "regular-hours": form.querySelector("[name='regular-hours']").value,
            "overtime-hours": form.querySelector("[name='overtime-hours']").value,
            status: form.querySelector("[name='status']").selectedOptions[0]?.textContent?.trim() ?? "",
            urgency: form.querySelector("[name='urgency']").selectedOptions[0]?.textContent?.trim() ?? "",
            progress: form.querySelector("[name='progress']").value,
          };
          if (query.get("mismatch") === "1") values.project = "错误项目";
          parent.__addProjectAiMockRecord(values);
        }
        document.querySelector("#results").append(result);
      });
    </script>
  </body>
</html>
